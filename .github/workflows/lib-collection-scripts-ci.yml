name: Collection Scripts Library CI

on:
  push:
    branches: [main]
    paths:
      - "lib/**"
      - "packages/**"
      - "pnpm-lock.yaml"
  pull_request:
    branches: [main]
    paths:
      - "lib/**"
      - "packages/**"
      - "pnpm-lock.yaml"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  NODE_VERSION: "24"
  PNPM_VERSION: "10"

jobs:
  lint-and-test:
    name: Lint and Test
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"
          cache-dependency-path: "pnpm-lock.yaml"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build workspace packages
        run: pnpm -r --filter=./packages/... run build

      - name: Build lib package
        run: pnpm --filter=@prompt-registry/collection-scripts run build

      - name: Run tests
        run: pnpm --filter=@prompt-registry/collection-scripts run test

  publish:
    name: Publish to npmjs
    runs-on: ubuntu-latest
    environment: npmjs
    needs: lint-and-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      id-token: write  # Required for OIDC
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"
          cache-dependency-path: "pnpm-lock.yaml"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build workspace packages
        run: pnpm -r --filter=./packages/... run build

      - name: Build lib package
        run: pnpm --filter=@prompt-registry/collection-scripts run build

      - name: Check if version changed
        working-directory: lib
        id: version-check
        run: |
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          echo "version=$PACKAGE_VERSION" >> $GITHUB_OUTPUT

          if git tag -l "collection-scripts-v$PACKAGE_VERSION" | grep -q .; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "Version $PACKAGE_VERSION already published"
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Create version tag
        if: steps.version-check.outputs.exists == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "collection-scripts-v${{ steps.version-check.outputs.version }}"
          git push origin "collection-scripts-v${{ steps.version-check.outputs.version }}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish package
        working-directory: lib
        if: steps.version-check.outputs.exists == 'false'
        run: pnpm publish --provenance --access public --no-git-checks
